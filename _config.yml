theme: jekyll-theme-chirpy

lang: en
timezone: Asia/Seoul

title: mini-chip
tagline: Aspiring hackers
description: >-
  CTF write-ups, security rabbit holes, and notes from whatever I'm learning next.

url: "https://mini-chip.kr"
baseurl: ""

github:
  username: JiminChip

social:
  name: Jimin Jeong
  email: jjm4043@gmail.com
  links:
    - https://github.com/JiminChip
    - https://dreamhack.io/users/25740

avatar: "/assets/img/profile.jpg"
toc: true

paginate: 10
permalink: /posts/:title/

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      toc: true
  - scope:
      path: "CTF"
    values:
      toc: true
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight

# Preserve line breaks in highlighted code blocks. Chirpy's HTML compressor
# otherwise collapses the contents of <pre> elements into a single line.
compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: true
  ignore:
    envs: [development]

plugins:
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-archives
  - jekyll-sitemap
  - jekyll-include-cache

jekyll-archives:
  enabled:
    - categories
    - tags
  layouts:
    category: category
    tag: tag
  permalinks:
    category: /categories/:name/
    tag: /tags/:name/

exclude:
  - README.md
  - LICENSE
  - Gemfile.lock
  - _additional_pages
  - _site
  - Notion.md
